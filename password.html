<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Analyzer</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        h1 {
            text-align: center;
        }

        .container {
            width: 300px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .input-box {
            display: flex;
            flex-direction: column;
        }

        input {
            padding: 10px;
            margin-bottom: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px;
            cursor: pointer;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background: #0056b3;
        }

        #message {
            display: none;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <h1>Password Strength Analyzer</h1>

    <div class="container">
        <div class="input-box">
            <input type="password" id="password" placeholder="Enter your password">

            <button id="analyzeBtn">Analyze</button>

            <p id="message">Password is <span id="strength">-</span></p>
        </div>
    </div>

    <script>
        var pass = document.getElementById("password");
        var message = document.getElementById("message");
        var str = document.getElementById("strength");
        var btn = document.getElementById("analyzeBtn");

        function checkStrength() {
            var val = pass.value;

            if (val.length === 0) {
                message.style.display = "none";
                return;
            }

            message.style.display = "block";

            var strength = "Weak";
            var color = "red";

            if (
                val.length >= 8 &&
                /[A-Z]/.test(val) &&
                /[a-z]/.test(val) &&
                /[0-9]/.test(val) &&
                /[!@#$%^&*()_+]/.test(val)
            ) {
                strength = "Strong";
                color = "green";
            } 
            else if (
                val.length >= 6 &&
                /[A-Z]/.test(val) &&
                /[0-9]/.test(val)
            ) {
                strength = "Medium";
                color = "orange";
            }

            str.textContent = strength;
            str.style.color = color;
        }

        // Run while typing
        pass.addEventListener("input", checkStrength);

        // Run on button click
        btn.addEventListener("click", checkStrength);
    </script>

</body>
</html>
